[settings]
experimental = true
dotfiles.root = "~/Developer/configuration/"
dotfiles.default_mode = "symlink"

[dotfiles]
"~/.agents/AGENTS.md" = {}
"~/.agents/skills" = {}
"~/.codex/AGENTS.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.codex/skills" = { source = "~/Developer/configuration/.agents/skills" }
"~/.claude/CLAUDE.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.claude/skills" = { source = "~/Developer/configuration/.agents/skills" }
"~/.config/git/config" = {}
"~/.config/git/ignore" = {}
"~/.config/mise/config.toml" = {}
"~/.config/zed/keymap.json" = {}
"~/.config/zed/settings.json" = {}
"~/.vimrc" = {}
"~/.zshrc" = {}

[bootstrap.macos.finder]
preferred_view_style = "column"
show_extensions_warning = false
show_pathbar = true

[bootstrap.macos.trackpad]
tap_to_click = true
three_finger_drag = true

[bootstrap.macos.defaults]
NSGlobalDomain = { AppleInterfaceStyleSwitchesAutomatically = true, "com.apple.springing.delay" = 0.1, "com.apple.springing.enabled" = true }
"com.apple.WindowManager" = { EnableTiledWindowMargins = true, GloballyEnabled = true }

[bootstrap.packages]
"brew:zsh-autosuggestions" = "latest"
"brew:zsh-syntax-highlighting" = "latest"
"brew-cask:crossover" = "latest"
"brew-cask:figma" = "latest"

[tools]
"claude-code" = "latest"
codex = "latest"
gh = "latest"
