[settings]
experimental = true
dotfiles.root = "~/Developer/configuration/"
dotfiles.default_mode = "symlink"

[dotfiles]
"~/.agents/AGENTS.md" = {}
"~/.agents/skills" = {}
"~/.codex/AGENTS.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.codex/skills" = { source = "~/Developer/configuration/.agents/skills" }
"~/.claude/CLAUDE.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.claude/skills" = { source = "~/Developer/configuration/.agents/skills" }
"~/.config/git/config" = {}
"~/.config/git/ignore" = {}
"~/.config/mise/config.toml" = {}
"~/.config/zed/keymap.json" = {}
"~/.config/zed/settings.json" = {}
"~/.config/ghostty/config" = {}
"~/.config/herdr/config.toml" = {}
"~/.config/nvim" = {}
"~/.hermes/AGENTS.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.hermes/SOUL.md" = {}
"~/.hermes/config.yaml" = {}
"~/.hermes/memories/USER.md" = {}
"~/.hermes/skills" = { source = "~/Developer/configuration/.agents/skills" }
"~/.vimrc" = {}
"~/.zshrc" = {}

[bootstrap.macos.finder]
preferred_view_style = "column"
show_extensions_warning = false
show_pathbar = true

[bootstrap.macos.trackpad]
tap_to_click = true
three_finger_drag = true

[bootstrap.macos.defaults]
NSGlobalDomain = { AppleInterfaceStyleSwitchesAutomatically = true, "com.apple.springing.delay" = 0.0, "com.apple.springing.enabled" = true }
"com.apple.WindowManager" = { EnableTiledWindowMargins = true, GloballyEnabled = true }

[tools]
# CLI tools
"pipx:hermes-agent" = { version = "latest", extras = "acp" }
claude = "latest"
gh = "latest"
herdr = "latest"
node = "latest"
neovim = "latest"
uv = "latest"
