[settings]
dotfiles.default_mode = "symlink"
dotfiles.root = "~/Developer/configuration/"
experimental = true

[tools]
azure-cli = { version = "2.88.0", uvx_args = "--prerelease=allow" }
# CLI tooling managed by mise.
gh = "latest"
mas = "latest"
node = "latest"
pkl = "latest"
swift = "latest"

[bootstrap.repos]
"~/Developer/configuration" = { url = "https://github.com/mac95sb/configuration" }
"~/Developer/orchestrator" = { url = "https://github.com/mac95sb/orchestrator" }
"~/Developer/score" = { url = "https://github.com/mac95sb/score" }
"~/Developer/scratchpad" = { url = "https://github.com/mac95sb/scratchpad" }
"~/Developer/skills" = { url = "https://github.com/mac95sb/skills" }

[bootstrap.packages]
# Fonts.
"brew-cask:font-sf-mono-nerd-font-ligaturized" = "latest"
"brew-cask:font-sf-pro" = "latest"

# Developer tools.
#"brew-cask:mole-app" = "latest"
"brew-cask:postico" = "latest"
"brew-cask:zed" = "latest"
"mas:497799835" = "latest"  # Xcode

# Productivity and design.
#"mas:1289583905" = "latest" # Pixelmator Pro
#"mas:1662217862" = "latest" # Wipr 2
#"mas:361285480" = "latest"  # Keynote
#"mas:361304891" = "latest"  # Numbers
#"mas:361309726" = "latest"  # Pages

# Media apps.
"brew-cask:crossover" = "latest"
#"mas:424389933" = "latest"  # Final Cut Pro
#"mas:424390742" = "latest"  # Compressor
#"mas:434290957" = "latest"  # Motion
#"mas:634148309" = "latest"  # Logic Pro
#"mas:634159523" = "latest"  # MainStage

[bootstrap.macos.defaults."com.apple.WindowManager"]
GloballyEnabled = true
EnableTiledWindowMargins = true

[bootstrap.macos.trackpad]
tap_to_click = true
three_finger_drag = true

[bootstrap.mise_shell_activate]
zshrc = "activate"

[tasks.skills]
description = "Install shared agent skills with skills.sh."
run = """
npx --yes skills add n0an/App-Intents-Agent-Skill --global --agent codex claude-code --skill app-intents --copy --yes
npx --yes skills add AvdLee/Core-Data-Agent-Skill --global --agent codex claude-code --skill core-data-expert --copy --yes
npx --yes skills add dadederk/iOS-Accessibility-Agent-Skill --global --agent codex claude-code --skill ios-accessibility --copy --yes
npx --yes skills add jazzychad/ios-code-audit --global --agent codex claude-code --skill ios-code-audit --copy --yes
npx --yes skills add conorluddy/ios-simulator-skill --global --agent codex claude-code --skill ios-simulator-skill --copy --yes
npx --yes skills add efremidze/swift-architecture-skill --global --agent codex claude-code --skill swift-architecture-skill --copy --yes
npx --yes skills add twostraws/Swift-Concurrency-Agent-Skill --global --agent codex claude-code --skill swift-concurrency-pro --copy --yes
npx --yes skills add ivan-magda/swift-security-skill --global --agent codex claude-code --skill swift-security-expert --copy --yes
npx --yes skills add twostraws/Swift-Testing-Agent-Skill --global --agent codex claude-code --skill swift-testing-pro --copy --yes
npx --yes skills add twostraws/SwiftData-Agent-Skill --global --agent codex claude-code --skill swiftdata-pro --copy --yes
npx --yes skills add twostraws/SwiftUI-Agent-Skill --global --agent codex claude-code --skill swiftui-pro --copy --yes
npx --yes skills add mac95sb/skills --global --agent codex claude-code --skill '*' --copy --yes
"""

[hooks]
postinstall = { task = "skills" }

[dotfiles]
# Agent instructions.
"~/.claude/CLAUDE.md" = { source = "~/Developer/configuration/AGENTS.md" }
"~/.codex/AGENTS.md" = { source = "~/Developer/configuration/AGENTS.md" }

# Tool configuration.
"~/.config/git/config" = {}
"~/.config/git/ignore" = {}
"~/.config/mise/config.toml" = {}

# Shell and editor configuration.
"~/.config/zed/keymap.json" = {}
"~/.config/zed/settings.json" = {}
"~/.config/zsh/.p10k.zsh" = {}
"~/.config/zsh/.zshrc" = {}
"~/.vimrc" = {}
"~/.zshenv" = { source = "~/Developer/configuration/.config/zsh/.zshenv" }
