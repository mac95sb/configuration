[bootstrap.macos.defaults]
NSGlobalDomain = {
    AppleInterfaceStyleSwitchesAutomatically = true,
    "com.apple.springing.delay" = 0.1,
    "com.apple.springing.enabled" = true
}
"com.apple.WindowManager" = {
    EnableTiledWindowMargins = true,
    GloballyEnabled = true
}

[bootstrap.macos.finder]
preferred_view_style = "column"
show_extensions_warning = false
show_pathbar = true

[bootstrap.macos.trackpad]
tap_to_click = true
three_finger_drag = true

[bootstrap.mise_shell_activate]
zshrc = "activate"

[dotfiles]
# Shared agent instructions and skills.
"~/.agents/AGENTS.md" = {}
"~/.agents/skills" = {}

# Agent-specific aliases to the shared files above.
"~/.claude/CLAUDE.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.claude/skills" = { source = "~/Developer/configuration/.agents/skills" }
"~/.codex/AGENTS.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.codex/skills" = { source = "~/Developer/configuration/.agents/skills" }

# Tool configuration.
"~/.config/git/config" = {}
"~/.config/git/ignore" = {}
"~/.config/mise/config.toml" = {}

# Shell and editor configuration.
"~/.config/zed/keymap.json" = {}
"~/.config/zed/settings.json" = {}
"~/.config/zsh/.p10k.zsh" = {}
"~/.config/zsh/.zshrc" = {}
"~/.vimrc" = {}
"~/.zshenv" = { source = "~/Developer/configuration/.config/zsh/.zshenv" }
