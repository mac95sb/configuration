[settings]
dotfiles.default_mode = "symlink"
dotfiles.root = "~/Developer/configuration/"
experimental = true

[bootstrap.repos]
"~/Developer/score" = { url = "https://github.com/mac95sb/score" }

[bootstrap.macos.defaults]
NSGlobalDomain = {
    AppleInterfaceStyleSwitchesAutomatically = true,
    "com.apple.springing.delay" = 0.1,
    "com.apple.springing.enabled" = true
}
"com.apple.WindowManager" = {
    EnableTiledWindowMargins = true,
    GloballyEnabled = true
}

[bootstrap.macos.finder]
preferred_view_style = "column"
show_extensions_warning = false
show_pathbar = true

[bootstrap.macos.trackpad]
tap_to_click = true
three_finger_drag = true

[tools]
# CLI Tooling
codex = "latest"
gh = "latest"
mas = "latest"
pkl = "latest"

[bootstrap.packages]
# App Store Applications
"mas:1289583905" = "latest" # Pixelmator Pro
"mas:1662217862" = "latest" # Wipr 2
"mas:361285480" = "latest"  # Keynote
"mas:361304891" = "latest"  # Numbers
"mas:361309726" = "latest"  # Pages
"mas:424389933" = "latest"  # Final Cut Pro
"mas:424390742" = "latest"  # Compressor
"mas:434290957" = "latest"  # Motion
"mas:497799835" = "latest"  # Xcode
"mas:634148309" = "latest"  # Logic Pro
"mas:634159523" = "latest"  # MainStage

# Fonts
"brew-cask:font-sf-mono-nerd-font-ligaturized" = "latest"
"brew-cask:font-sf-pro" = "latest"

# GUI Applications
"brew-cask:figma" = "latest"
"brew-cask:notion" = "latest"
"brew-cask:orbstack" = "latest"
"brew-cask:postico" = "latest"
"brew-cask:zed" = "latest"

[dotfiles]
"~/.agents/AGENTS.md" = {}
"~/.agents/skills" = {}
"~/.claude/CLAUDE.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.claude/skills" = { source = "~/Developer/configuration/.agents/skills" }
"~/.codex/AGENTS.md" = { source = "~/Developer/configuration/.agents/AGENTS.md" }
"~/.codex/skills" = { source = "~/Developer/configuration/.agents/skills" }
"~/.config/git/config" = {}
"~/.config/git/ignore" = {}
"~/.config/mise/config.toml" = {}
"~/.config/zed/keymap.json" = {}
"~/.config/zed/settings.json" = {}
"~/.config/zsh/.p10k.zsh" = {}
"~/.config/zsh/.zshrc" = {}
"~/.vimrc" = {}
"~/.zshenv" = { source = "~/Developer/configuration/.config/zsh/.zshenv" }
