[settings]
dotfiles.default_mode = "symlink"
dotfiles.root = "~/Developer/configuration/"
experimental = true

[tools]
# CLI tooling managed by mise.
codex = "latest"
gh = "latest"
mas = "latest"
pkl = "latest"

[bootstrap.repos]
"~/Developer/configuration" = { url = "https://github.com/mac95sb/configuration" }
"~/Developer/score" = { url = "https://github.com/mac95sb/score" }

