onboarding = false
[theme]
name = "terminal"
auto_switch = false

[ui.toast]
delivery = "herdr"

[ui]
show_agent_labels_on_pane_borders = false
prompt_new_tab_name = false

[keys]
switch_workspace = "alt+shift+1..9"

[[keys.command]]
key = "alt+h"
type = "plugin_action"
command = "herdr-splits.nav-left"

[[keys.command]]
key = "alt+j"
type = "plugin_action"
command = "herdr-splits.nav-down"

[[keys.command]]
key = "alt+k"
type = "plugin_action"
command = "herdr-splits.nav-up"

[[keys.command]]
key = "alt+l"
type = "plugin_action"
command = "herdr-splits.nav-right"

[[keys.command]]
key = "alt+shift+h"
type = "plugin_action"
command = "herdr-splits.resize-left"

[[keys.command]]
key = "alt+shift+j"
type = "plugin_action"
command = "herdr-splits.resize-down"

[[keys.command]]
key = "alt+shift+k"
type = "plugin_action"
command = "herdr-splits.resize-up"

[[keys.command]]
key = "alt+shift+l"
type = "plugin_action"
command = "herdr-splits.resize-right"
